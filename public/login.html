<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống Đăng Ký Môn Học</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1>Portal Đăng Ký Môn Học</h1>
        <p style="color:#475569; text-align:center; margin-bottom:24px;">Nhập mã sinh viên / admin và mật khẩu để truy cập trang quản lý.</p>
        <form id="loginForm">
            <div class="form-group">
                <label>Tên Đăng Nhập</label>
                <input type="text" id="username" class="form-control" required placeholder="Nhập mã SV hoặc tên admin">
            </div>
            <div class="form-group">
                <label>Mật Khẩu</label>
                <input type="password" id="password" class="form-control" required placeholder="Nhập mật khẩu">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Đăng Nhập</button>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
